<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baixinha Pharma</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Baixinha&nbsp;Pharma</h1>
    <p class="subtitle">Sua loja de confiança para peptídeos, cápsulas e injetáveis</p>
  </header>
  <main>
    <section id="product-list" class="container">
      <!-- Os produtos serão preenchidos dinamicamente aqui -->
    </section>
  </main>

  <!-- Modal para seleção de quantidade e pagamento -->
  <div id="order-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close">&times;</span>
      <h2 id="modal-product-name"></h2>
      <p id="modal-product-info"></p>
      <p id="modal-product-description"></p>
      <form id="order-form">
        <label for="quantity">Quantidade:</label>
        <input type="number" id="quantity" name="quantity" min="1" value="1" required>
        <label for="payment-method">Forma de pagamento:</label>
        <select id="payment-method" name="payment-method" required>
          <option value="Debito">Débito</option>
          <option value="Credito">Crédito</option>
          <option value="Dinheiro">Dinheiro</option>
          <option value="Pix">Pix</option>
        </select>
        <button type="submit" id="send-whatsapp">Enviar pedido pelo WhatsApp</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
